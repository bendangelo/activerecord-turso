name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - journal_mode: wal
            experimental_features: ""
          - journal_mode: mvcc
            experimental_features: "index_method"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: bundle install

      - name: Run tests (${{ matrix.journal_mode }} mode)
        env:
          TURSO_TEST_JOURNAL_MODE: ${{ matrix.journal_mode }}
          TURSO_TEST_EXPERIMENTAL_FEATURES: ${{ matrix.experimental_features }}
        run: bundle exec rake test

      - name: Run tests with FTS enabled
        if: matrix.experimental_features != ''
        env:
          TURSO_TEST_JOURNAL_MODE: ${{ matrix.journal_mode }}
          TURSO_TEST_EXPERIMENTAL_FEATURES: ${{ matrix.experimental_features }}
        run: bundle exec ruby -Itest test/integration/schema_operations_test.rb -v
