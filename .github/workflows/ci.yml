name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        mode: ["wal", "mvcc"]
        features: ["index_method", "generated_columns"]
    env:
      TURSO_TEST_JOURNAL_MODE: ${{ matrix.mode }}
      TURSO_TEST_EXPERIMENTAL_FEATURES: ${{ matrix.features }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/checkout@v4
        with:
          repository: bendangelo/turso
          path: turso

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: bundle exec rake test
