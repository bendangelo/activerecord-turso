name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
        config:
          - name: wal
            env:
              TURSO_TEST_JOURNAL_MODE: wal
          - name: mvcc
            env:
              TURSO_TEST_JOURNAL_MODE: mvcc
          - name: generated_columns
            env:
              TURSO_TEST_EXPERIMENTAL_FEATURES: generated_columns
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests (${{ matrix.config.name }} / Ruby ${{ matrix.ruby }})
        env: ${{ matrix.config.env }}
        run: bundle exec rake test
